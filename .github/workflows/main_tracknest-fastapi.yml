name: Build and deploy Python app to Azure Web App - tracknest-fastapi

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          else
            echo "⚠️ No requirements.txt found"
          fi

      - name: Verify requirements.txt exists at root    # ← new: catch early
        run: |
          if [ ! -f requirements.txt ]; then
            echo "❌ requirements.txt not found at repo root!"
            exit 1
          fi
          echo "✅ requirements.txt found"
          cat requirements.txt

      - name: Create deployment package
        run: |
          zip -r release.zip . \
            -x "venv/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x ".git/*" \
            -x ".github/*"

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8F79F3FB8BFC45089C5AB78920AF53F1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_015CB5B61FCD4226BF4A633E9A4B1780 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_ABABCB930CB949B0A57D5D59F643A1A9 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: tracknest-fastapi
          package: .
